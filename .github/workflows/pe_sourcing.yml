name: PE Deal Sourcing — Sector Search
run-name: "${{ inputs.companies && 'Manual: ' || '' }}${{ inputs.sector || 'company lookup' }}"

on:
  workflow_dispatch:
    inputs:
      sector:
        description: 'Sector description (e.g. "fire safety", "HVAC contractors", "pest control"). Not needed if using companies field.'
        required: false
        default: 'lift maintenance'
      companies:
        description: 'Pipe-separated company names OR numbers (e.g. "ACME LTD|07827663|SC371215"). Standalone or combined with sector.'
        required: false
        default: ''
      region:
        description: 'UK region filter (leave blank for all UK)'
        required: false
        default: ''
      min_revenue:
        description: 'Minimum estimated revenue (e.g. 500000)'
        required: false
        default: ''
      notify_email:
        description: 'Email address to send results to'
        required: false
        default: 'daniellipinski@mac.com'
      extras_only:
        description: 'Re-enrichment run — skip discovery/financials, top-up selected modules only'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      max_companies:
        description: 'Max companies to process after filtering (leave blank for all; e.g. 50 for a quick test)'
        required: false
        default: ''
      batch_count:
        description: 'Number of parallel enrichment workers (default 8 — each handles ~1/N of the companies)'
        required: false
        default: '8'
      runner_type:
        description: 'Runner size for enrichment workers. ubuntu-latest = 2 vCPU (free). ubuntu-latest-4-cores = 4 vCPU (Teams/Enterprise). ubuntu-latest-8-cores = 8 vCPU (Enterprise).'
        required: false
        default: 'ubuntu-latest'

      # ── Search universe ───────────────────────────────────────────────────
      search_source:
        description: 'Discovery method: sic (SIC codes only), register (regulatory only), or both (merged)'
        required: false
        default: 'sic'
        type: choice
        options: ['sic', 'register', 'both']
      reg_sources:
        description: 'Comma-separated regulatory register keys (e.g. EA_WASTE,CQC). Required when search_source is register or both.'
        required: false
        default: ''
      reg_query:
        description: 'Keyword to filter the regulatory register (leave blank for all entries)'
        required: false
        default: ''

      # ── Company quality filters ───────────────────────────────────────────
      min_age_years:
        description: 'Minimum company age in years — excludes recently incorporated firms (0 = no filter)'
        required: false
        default: ''
      clean_charges_only:
        description: 'Exclude companies with outstanding charges on the CH register'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      excluded_sics:
        description: 'Comma-separated SIC codes to exclude (e.g. 38110,38120)'
        required: false
        default: ''
      trade_bodies:
        description: 'Trade/industry body member discovery. "AUTO" = dynamic web search for sector. Comma-separated keys to specify bodies: LEIA, BESA, ECA — or a raw member-list URL. Leave blank to disable.'
        required: false
        default: 'AUTO'

      # ── Per-module toggles (true = run, false = skip) ─────────────────────
      run_ocr:
        description: 'Accounts OCR — actual P&L from filed CH PDFs (~30 min extra)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      run_contacts:
        description: 'Director Contacts — email inference + LinkedIn (~20 min)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      run_sell_signals:
        description: 'Sell Signals — exit readiness, late filings, churn (~5 min)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      run_contracts:
        description: 'Gov. Contracts — Contracts Finder + Find a Tender (~10 min)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      run_digital:
        description: 'Digital Health — website, domain age, LinkedIn, jobs (~20 min)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      run_accreditations:
        description: 'Accreditations — EA, CQC, FCA, ICO, SIA, ISO registers (~10 min)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      run_competitor_map:
        description: 'Competitor Map — 10 nearest rivals per company (~15 min)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

# ── Shared setup steps (reused as YAML anchors where supported) ───────────────
# GitHub Actions doesn't support anchors natively, so setup is repeated per job.
# Each job is self-contained; artifacts pass data between phases.

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — DISCOVER
  # Steps 1–4: search, filter, enrich, financials.
  # Uploads enriched_companies.json as an artifact for the enrich workers.
  # Estimated time: 30–90 min depending on universe size.
  # ════════════════════════════════════════════════════════════════════════════
  discover:
    name: "1 — Discover & Financials"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    outputs:
      company_count: ${{ steps.discover_run.outputs.company_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            openpyxl \
            python-dateutil \
            PyMuPDF \
            pgeocode \
            pandas \
            numpy

      - name: Write API keys
        run: |
          echo "COMPANIES_HOUSE_API_KEY=${{ secrets.CH_API_KEY }}" > .ch_api_key
          echo "COMPANIES_HOUSE_API_KEY_2=${{ secrets.CH_API_KEY_2 }}" >> .ch_api_key
          echo "COMPANIES_HOUSE_API_KEY_3=${{ secrets.CH_API_KEY_3 }}" >> .ch_api_key
          echo "FCA_SUBSCRIPTION_KEY=${{ secrets.FCA_SUBSCRIPTION_KEY }}" >> .ch_api_key
          echo "FCA_EMAIL=${{ secrets.FCA_EMAIL }}" >> .ch_api_key
          echo "CQC_API_KEY=${{ secrets.CQC_API_KEY }}" >> .ch_api_key
          echo "DISIFY_API_KEY=${{ secrets.DISIFY_API_KEY }}" >> .ch_api_key
          echo "COMPANIES_HOUSE_API_KEY_4=${{ secrets.CH_API_KEY_4 }}" >> .ch_api_key
          echo "COMPANIES_HOUSE_API_KEY_5=${{ secrets.CH_API_KEY_5 }}" >> .ch_api_key

      - name: Prepare directories
        run: mkdir -p output data/sectors

      # ── Restore / build local Companies House DB ──────────────────────────
      - name: Restore cached DB
        id: db-cache
        if: inputs.companies == '' || inputs.sector != ''
        uses: actions/cache/restore@v4
        with:
          path: data/companies_house.db
          key: ch-db-${{ hashFiles('datasets/uk_companies_full/*.zip') }}

      - name: Build local Companies House DB
        if: (inputs.companies == '' || inputs.sector != '') && steps.db-cache.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss — building DB from bulk CSVs..."
          ls -lh datasets/uk_companies_full/BasicCompanyData-*.zip 2>/dev/null || echo "  ⚠ No parts found!"
          python3 build_local_db.py
          if [ -f "data/companies_house.db" ]; then
            ls -lh data/companies_house.db
            python3 build_local_db.py --stats
          else
            echo "⚠ DB build failed — falling back to API search"
          fi

      - name: Save DB to cache
        if: (inputs.companies == '' || inputs.sector != '') && steps.db-cache.outputs.cache-hit != 'true' && always()
        uses: actions/cache/save@v4
        with:
          path: data/companies_house.db
          key: ch-db-${{ hashFiles('datasets/uk_companies_full/*.zip') }}

      - name: Verify DB
        if: inputs.companies == '' || inputs.sector != ''
        run: |
          if [ -f "data/companies_house.db" ]; then
            echo "✅ DB ready ($(du -h data/companies_house.db | cut -f1))"
            python3 build_local_db.py --stats
          else
            echo "⚠ No local DB — will use API search"
          fi

      # ── Build discovery flags ─────────────────────────────────────────────
      - name: Build discovery flags
        id: flags
        run: |
          FLAGS=""

          if [ "${{ inputs.extras_only }}" = "true" ]; then
            FLAGS="$FLAGS --extras-only"
          fi

          if [ -n "${{ inputs.max_companies }}" ] && [ "${{ inputs.max_companies }}" != "0" ]; then
            FLAGS="$FLAGS --max-companies ${{ inputs.max_companies }}"
          fi

          if [ "${{ inputs.search_source }}" = "register" ] || [ "${{ inputs.search_source }}" = "both" ]; then
            FLAGS="$FLAGS --search-source ${{ inputs.search_source }}"
            IFS=',' read -ra REGS <<< "${{ inputs.reg_sources }}"
            for R in "${REGS[@]}"; do
              R="$(echo "$R" | xargs)"
              [ -n "$R" ] && FLAGS="$FLAGS --reg-source $R"
            done
            [ -n "${{ inputs.reg_query }}" ] && FLAGS="$FLAGS --reg-query '${{ inputs.reg_query }}'"
          fi

          if [ -n "${{ inputs.min_age_years }}" ] && [ "${{ inputs.min_age_years }}" != "0" ]; then
            FLAGS="$FLAGS --min-age ${{ inputs.min_age_years }}"
          fi
          [ -n "${{ inputs.region }}" ] && FLAGS="$FLAGS --region '${{ inputs.region }}'"
          [ "${{ inputs.clean_charges_only }}" = "true" ] && FLAGS="$FLAGS --clean-charges"

          if [ -n "${{ inputs.excluded_sics }}" ]; then
            IFS=',' read -ra SICS <<< "${{ inputs.excluded_sics }}"
            for S in "${SICS[@]}"; do
              S="$(echo "$S" | xargs)"
              [ -n "$S" ] && FLAGS="$FLAGS --exclude-sic $S"
            done
          fi

          if [ -n "${{ inputs.trade_bodies }}" ] && [ "${{ inputs.trade_bodies }}" != "none" ]; then
            IFS=',' read -ra TBS <<< "${{ inputs.trade_bodies }}"
            for TB in "${TBS[@]}"; do
              TB="$(echo "$TB" | xargs)"
              [ -n "$TB" ] && FLAGS="$FLAGS --trade-body $TB"
            done
          fi

          # Discovery phase: always skip enrichment modules — they run in parallel next
          FLAGS="$FLAGS --skip-contacts --no-accounts-ocr --no-sell-signals --no-contracts --no-digital --no-accreditations --no-bolt-on --no-competitor-map --no-acquisition-score"

          echo "flags=$FLAGS" >> $GITHUB_OUTPUT
          echo "Built flags: $FLAGS"

      # ── Run discovery + financials (steps 1–4, no enrichment) ────────────
      - name: Run discovery and financials
        id: discover_run
        env:
          COMPANIES_HOUSE_API_KEY: ${{ secrets.CH_API_KEY }}
          SECTOR_REGION: ${{ inputs.region }}
          SECTOR_MIN_REVENUE: ${{ inputs.min_revenue }}
        run: |
          SECTOR="${{ inputs.sector }}"
          COMPANIES="${{ inputs.companies }}"
          FLAGS="${{ steps.flags.outputs.flags }}"

          CMD="python3 run.py"
          if [ -n "$COMPANIES" ] && [ -n "$SECTOR" ]; then
            CMD="$CMD --sector \"$SECTOR\" --companies \"$COMPANIES\""
          elif [ -n "$COMPANIES" ]; then
            CMD="$CMD --companies \"$COMPANIES\""
          else
            CMD="$CMD --sector \"$SECTOR\""
          fi

          eval $CMD $FLAGS

          # Emit company count for downstream job summary
          COUNT=$(python3 -c "
          import json, os
          p = 'output/enriched_companies.json'
          if os.path.exists(p):
              print(len(json.load(open(p))))
          else:
              print(0)
          ")
          echo "company_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Companies discovered: $COUNT"

      # ── Upload enriched_companies.json for enrich workers ─────────────────
      - name: Upload enriched companies
        uses: actions/upload-artifact@v4
        with:
          name: enriched-companies
          path: output/enriched_companies.json
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — ENRICH (PARALLEL MATRIX)
  # Each worker gets 1/N of the companies and runs all enrichment modules:
  # OCR (4b), contacts (5), sell signals (6), contracts (7), digital (8),
  # accreditations (9), bolt-on (10), competitor map (11), acq score (12).
  # Workers run simultaneously — total wall-clock ≈ single-worker time.
  # Estimated time per worker: 60–120 min for ~335 companies (8-way split).
  # ════════════════════════════════════════════════════════════════════════════
  enrich:
    name: "2 — Enrich (batch ${{ matrix.batch_index }} of ${{ inputs.batch_count || '8' }})"
    needs: discover
    runs-on: ${{ inputs.runner_type || 'ubuntu-latest' }}
    timeout-minutes: 360

    strategy:
      fail-fast: false   # let other batches finish even if one fails
      matrix:
        batch_index: [0, 1, 2, 3, 4, 5, 6, 7]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            openpyxl \
            python-dateutil \
            PyMuPDF \
            pgeocode \
            pandas \
            numpy

      - name: Write API keys
        run: |
          echo "COMPANIES_HOUSE_API_KEY=${{ secrets.CH_API_KEY }}" > .ch_api_key
          echo "COMPANIES_HOUSE_API_KEY_2=${{ secrets.CH_API_KEY_2 }}" >> .ch_api_key
          echo "COMPANIES_HOUSE_API_KEY_3=${{ secrets.CH_API_KEY_3 }}" >> .ch_api_key
          echo "FCA_SUBSCRIPTION_KEY=${{ secrets.FCA_SUBSCRIPTION_KEY }}" >> .ch_api_key
          echo "FCA_EMAIL=${{ secrets.FCA_EMAIL }}" >> .ch_api_key
          echo "CQC_API_KEY=${{ secrets.CQC_API_KEY }}" >> .ch_api_key
          echo "DISIFY_API_KEY=${{ secrets.DISIFY_API_KEY }}" >> .ch_api_key
          echo "COMPANIES_HOUSE_API_KEY_4=${{ secrets.CH_API_KEY_4 }}" >> .ch_api_key
          echo "COMPANIES_HOUSE_API_KEY_5=${{ secrets.CH_API_KEY_5 }}" >> .ch_api_key

      - name: Prepare directories
        run: mkdir -p output data/sectors

      # ── Download the enriched companies from discover job ─────────────────
      - name: Download enriched companies
        uses: actions/download-artifact@v4
        with:
          name: enriched-companies
          path: output/

      # ── Restore checkpoint from a previous attempt (if re-running) ────────
      # Cache key includes run_id so it's scoped to this workflow run.
      # run_attempt increments on each retry — restore-keys matches any prior
      # attempt so a timed-out job resumes exactly where it left off.
      - name: Restore batch checkpoint
        uses: actions/cache/restore@v4
        id: batch-checkpoint
        with:
          path: |
            output/batch_${{ matrix.batch_index }}.json
            output/batch_${{ matrix.batch_index }}_checkpoint.json
          key: batch-ckpt-${{ github.run_id }}-${{ matrix.batch_index }}-${{ github.run_attempt }}
          restore-keys: |
            batch-ckpt-${{ github.run_id }}-${{ matrix.batch_index }}-

      # ── Build enrichment flags ────────────────────────────────────────────
      - name: Build enrichment flags
        id: flags
        run: |
          FLAGS=""
          [ "${{ inputs.run_ocr }}"           = "false" ] && FLAGS="$FLAGS --no-accounts-ocr"
          [ "${{ inputs.run_contacts }}"       = "false" ] && FLAGS="$FLAGS --skip-contacts"
          [ "${{ inputs.run_sell_signals }}"   = "false" ] && FLAGS="$FLAGS --no-sell-signals"
          [ "${{ inputs.run_contracts }}"      = "false" ] && FLAGS="$FLAGS --no-contracts"
          [ "${{ inputs.run_digital }}"        = "false" ] && FLAGS="$FLAGS --no-digital"
          [ "${{ inputs.run_accreditations }}" = "false" ] && FLAGS="$FLAGS --no-accreditations"
          [ "${{ inputs.run_competitor_map }}" = "false" ] && FLAGS="$FLAGS --no-competitor-map"
          echo "flags=$FLAGS" >> $GITHUB_OUTPUT

      # ── Run this batch's enrichment (steps 4b–12) ─────────────────────────
      # Retries up to 3 times automatically. Each retry reads the checkpoint
      # and resumes from the last completed module — no work is repeated.
      - name: Run batch enrichment
        env:
          COMPANIES_HOUSE_API_KEY: ${{ secrets.CH_API_KEY }}
          SECTOR_REGION: ${{ inputs.region }}
          SECTOR_MIN_REVENUE: ${{ inputs.min_revenue }}
        run: |
          BATCH_COUNT="${{ inputs.batch_count || '8' }}"
          SECTOR="${{ inputs.sector }}"
          FLAGS="${{ steps.flags.outputs.flags }}"

          CMD="python3 run.py --batch-enrich \
               --batch-index ${{ matrix.batch_index }} \
               --batch-count $BATCH_COUNT"

          [ -n "$SECTOR" ] && CMD="$CMD --sector \"$SECTOR\""

          MAX_ATTEMPTS=3
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "━━━ Attempt $attempt/$MAX_ATTEMPTS (batch ${{ matrix.batch_index }}) ━━━"
            if eval $CMD $FLAGS; then
              echo "✅ Batch ${{ matrix.batch_index }} complete"
              exit 0
            fi
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "⚠ Attempt $attempt failed — checkpoint saved, retrying in 60s"
              sleep 60
            fi
          done
          echo "❌ All $MAX_ATTEMPTS attempts failed for batch ${{ matrix.batch_index }}"
          exit 1

      # ── Save checkpoint so a re-run can resume from here ─────────────────
      - name: Save batch checkpoint
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            output/batch_${{ matrix.batch_index }}.json
            output/batch_${{ matrix.batch_index }}_checkpoint.json
          key: batch-ckpt-${{ github.run_id }}-${{ matrix.batch_index }}-${{ github.run_attempt }}

      # ── Upload this batch's enriched output ───────────────────────────────
      - name: Upload batch results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: batch-${{ matrix.batch_index }}
          path: output/batch_${{ matrix.batch_index }}.json
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — MERGE + EXCEL
  # Downloads the base enriched_companies.json + all 8 batch_N.json files,
  # merges enrichment data back into the base by company_number, and builds
  # the final 10-sheet Excel workbook.
  # Estimated time: 5–15 min.
  # ════════════════════════════════════════════════════════════════════════════
  merge:
    name: "3 — Merge & Excel"
    needs: enrich
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: always()   # run even if some enrich batches failed — partial output > none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            openpyxl \
            python-dateutil \
            PyMuPDF \
            pgeocode \
            pandas \
            numpy

      - name: Write API keys
        run: |
          echo "COMPANIES_HOUSE_API_KEY=${{ secrets.CH_API_KEY }}" > .ch_api_key
          echo "COMPANIES_HOUSE_API_KEY_2=${{ secrets.CH_API_KEY_2 }}" >> .ch_api_key
          echo "COMPANIES_HOUSE_API_KEY_3=${{ secrets.CH_API_KEY_3 }}" >> .ch_api_key
          echo "FCA_SUBSCRIPTION_KEY=${{ secrets.FCA_SUBSCRIPTION_KEY }}" >> .ch_api_key
          echo "FCA_EMAIL=${{ secrets.FCA_EMAIL }}" >> .ch_api_key
          echo "CQC_API_KEY=${{ secrets.CQC_API_KEY }}" >> .ch_api_key
          echo "DISIFY_API_KEY=${{ secrets.DISIFY_API_KEY }}" >> .ch_api_key
          echo "COMPANIES_HOUSE_API_KEY_4=${{ secrets.CH_API_KEY_4 }}" >> .ch_api_key
          echo "COMPANIES_HOUSE_API_KEY_5=${{ secrets.CH_API_KEY_5 }}" >> .ch_api_key

      - name: Prepare directories
        run: mkdir -p output data/sectors

      # ── Download base enriched companies ──────────────────────────────────
      - name: Download enriched companies (base)
        uses: actions/download-artifact@v4
        with:
          name: enriched-companies
          path: output/

      # ── Download all batch enrichment results ────────────────────────────
      - name: Download all batch results
        uses: actions/download-artifact@v4
        with:
          pattern: batch-*
          path: output/
          merge-multiple: true

      - name: List downloaded files
        run: ls -lh output/

      # ── Merge batches + build Excel ───────────────────────────────────────
      - name: Merge batches and build Excel
        env:
          COMPANIES_HOUSE_API_KEY: ${{ secrets.CH_API_KEY }}
          SECTOR_REGION: ${{ inputs.region }}
          SECTOR_MIN_REVENUE: ${{ inputs.min_revenue }}
        run: |
          SECTOR="${{ inputs.sector }}"
          CMD="python3 run.py --merge-batches"
          [ -n "$SECTOR" ] && CMD="$CMD --sector \"$SECTOR\""
          eval $CMD

      # ── Upload final Excel ────────────────────────────────────────────────
      - name: Upload Excel output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pe-sourcing-results
          path: output/*.xlsx
          retention-days: 30
          overwrite: true

      # ── Send completion email ─────────────────────────────────────────────
      - name: Send completion email
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, urllib.error

          api_key      = os.environ.get("RESEND_API_KEY", "")
          notify_email = "${{ inputs.notify_email }}" or "daniellipinski@mac.com"

          if not api_key:
              print("[notify] RESEND_API_KEY not set — skipping email")
              raise SystemExit(0)

          run_id     = "${{ github.run_id }}"
          repo       = "${{ github.repository }}"
          sector     = "${{ inputs.sector }}"
          run_url    = f"https://github.com/{repo}/actions/runs/{run_id}"
          extras_only = "${{ inputs.extras_only }}" == "true"

          modules_run = []
          if "${{ inputs.run_ocr }}"           != "false": modules_run.append("Accounts OCR")
          if "${{ inputs.run_contacts }}"       != "false": modules_run.append("Contacts")
          if "${{ inputs.run_sell_signals }}"   != "false": modules_run.append("Sell Signals")
          if "${{ inputs.run_contracts }}"      != "false": modules_run.append("Gov. Contracts")
          if "${{ inputs.run_digital }}"        != "false": modules_run.append("Digital Health")
          if "${{ inputs.run_accreditations }}" != "false": modules_run.append("Accreditations")
          if "${{ inputs.run_competitor_map }}" != "false": modules_run.append("Competitor Map")

          batch_count = "${{ inputs.batch_count || '8' }}"
          run_type    = "Re-enrichment" if extras_only else "Full search"
          max_co_raw  = "${{ inputs.max_companies }}"
          max_co_str  = f"Top {max_co_raw} companies (test run)" if max_co_raw and max_co_raw != "0" else "All companies"

          payload = {
              "from":    "PE Deal Sourcing <onboarding@resend.dev>",
              "to":      [notify_email],
              "subject": f"✅ {sector.title()} — Deal Sourcing Report Ready",
              "text": (
                  f"Your {sector} intelligence report has finished.\n\n"
                  f"Run type: {run_type}  |  Parallel workers: {batch_count}\n"
                  f"Scope: {max_co_str}\n"
                  f"Modules run: {', '.join(modules_run) if modules_run else 'Core only (1-4)'}\n\n"
                  f"DOWNLOAD YOUR EXCEL:\n{run_url}\n\n"
                  f"→ Open the link → scroll to bottom → click 'pe-sourcing-results'\n\n"
                  f"Run ID: {run_id}\n"
                  f"— PE Deal Sourcing Pipeline\n"
              ),
          }

          data = json.dumps(payload).encode()
          req  = urllib.request.Request(
              "https://api.resend.com/emails",
              data=data,
              headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
              method="POST",
          )
          try:
              resp = urllib.request.urlopen(req, timeout=30)
              body = json.loads(resp.read())
              print(f"[notify] ✅ Email sent to {notify_email}  (id: {body.get('id')})")
          except urllib.error.HTTPError as e:
              print(f"[notify] ⚠ Resend error {e.code}: {e.read().decode()} — email skipped")
          except Exception as e:
              print(f"[notify] ⚠ Email skipped ({e})")
          EOF
