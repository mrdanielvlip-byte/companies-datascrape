name: PE Deal Sourcing — Sector Search
run-name: "${{ inputs.companies && 'Manual: ' || '' }}${{ inputs.sector || 'company lookup' }}"

on:
  workflow_dispatch:
    inputs:
      sector:
        description: 'Sector description (e.g. "fire safety", "HVAC contractors", "pest control"). Not needed if using companies field.'
        required: false
        default: 'lift maintenance'
      companies:
        description: 'Pipe-separated company names OR numbers (e.g. "ACME LTD|07827663|SC371215"). Standalone or combined with sector.'
        required: false
        default: ''
      region:
        description: 'UK region filter (leave blank for all UK)'
        required: false
        default: ''
      min_revenue:
        description: 'Minimum estimated revenue (e.g. 500000)'
        required: false
        default: ''
      notify_email:
        description: 'Email address to send results to'
        required: false
        default: 'daniellipinski@mac.com'
      extras_only:
        description: 'Re-enrichment run — skip discovery/financials, top-up selected modules only'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      max_companies:
        description: 'Max companies to process after filtering (leave blank for all; e.g. 50 for a quick test)'
        required: false
        default: ''

      # ── Search universe ───────────────────────────────────────────────────
      search_source:
        description: 'Discovery method: sic (SIC codes only), register (regulatory only), or both (merged)'
        required: false
        default: 'sic'
        type: choice
        options: ['sic', 'register', 'both']
      reg_sources:
        description: 'Comma-separated regulatory register keys (e.g. EA_WASTE,CQC). Required when search_source is register or both.'
        required: false
        default: ''
      reg_query:
        description: 'Keyword to filter the regulatory register (leave blank for all entries)'
        required: false
        default: ''

      # ── Company quality filters ───────────────────────────────────────────
      min_age_years:
        description: 'Minimum company age in years — excludes recently incorporated firms (0 = no filter)'
        required: false
        default: ''
      clean_charges_only:
        description: 'Exclude companies with outstanding charges on the CH register'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      excluded_sics:
        description: 'Comma-separated SIC codes to exclude (e.g. 38110,38120)'
        required: false
        default: ''
      trade_bodies:
        description: 'Trade/industry body member discovery. "AUTO" = dynamic web search for sector. Comma-separated keys to specify bodies: LEIA, BESA, ECA — or a raw member-list URL. Leave blank to disable.'
        required: false
        default: 'AUTO'

      # ── Per-module toggles (true = run, false = skip) ─────────────────────
      run_ocr:
        description: 'Accounts OCR — actual P&L from filed CH PDFs (~30 min extra)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      run_contacts:
        description: 'Director Contacts — email inference + LinkedIn (~20 min)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      run_sell_signals:
        description: 'Sell Signals — exit readiness, late filings, churn (~5 min)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      run_contracts:
        description: 'Gov. Contracts — Contracts Finder + Find a Tender (~10 min)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      run_digital:
        description: 'Digital Health — website, domain age, LinkedIn, jobs (~20 min)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      run_accreditations:
        description: 'Accreditations — EA, CQC, FCA, ICO, SIA, ISO registers (~10 min)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      run_competitor_map:
        description: 'Competitor Map — 10 nearest rivals per company (~15 min)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  pe-search:
    name: PE Sector Search — ${{ inputs.sector }}
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. System dependencies (Tesseract for OCR) ───────────────────────────
      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      # ── 3. Python dependencies ────────────────────────────────────────────────
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            openpyxl \
            python-dateutil \
            PyMuPDF \
            pgeocode \
            pandas \
            numpy

      # ── 4. Write API keys ─────────────────────────────────────────────────────
      - name: Write API keys
        run: |
          echo "COMPANIES_HOUSE_API_KEY=${{ secrets.CH_API_KEY }}" > .ch_api_key
          echo "COMPANIES_HOUSE_API_KEY_2=${{ secrets.CH_API_KEY_2 }}" >> .ch_api_key
          echo "COMPANIES_HOUSE_API_KEY_3=${{ secrets.CH_API_KEY_3 }}" >> .ch_api_key
          echo "FCA_SUBSCRIPTION_KEY=${{ secrets.FCA_SUBSCRIPTION_KEY }}" >> .ch_api_key
          echo "FCA_EMAIL=${{ secrets.FCA_EMAIL }}" >> .ch_api_key
          echo "CQC_API_KEY=${{ secrets.CQC_API_KEY }}" >> .ch_api_key

      # ── 5. Build output directory ─────────────────────────────────────────────
      - name: Prepare directories
        run: mkdir -p output data/sectors

      # ── Restore cached DB (skips 10-min rebuild if ZIPs haven't changed) ────────
      - name: Cache local Companies House DB
        id: db-cache
        uses: actions/cache@v4
        with:
          path: data/companies_house.db
          key: ch-db-${{ hashFiles('datasets/uk_companies_full/*.zip') }}

      - name: Build local Companies House DB
        if: steps.db-cache.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss — building DB from bulk CSVs..."
          echo "Parts found:"
          ls -lh datasets/uk_companies_full/BasicCompanyData-*.zip 2>/dev/null || echo "  ⚠ No parts found!"
          python3 build_local_db.py
          if [ -f "data/companies_house.db" ]; then
            ls -lh data/companies_house.db
            python3 build_local_db.py --stats
          else
            echo "⚠ DB build failed — falling back to API search"
          fi

      - name: Verify DB
        run: |
          if [ -f "data/companies_house.db" ]; then
            echo "✅ DB ready ($(du -h data/companies_house.db | cut -f1))"
            python3 build_local_db.py --stats
          else
            echo "⚠ No local DB — will use API search"
          fi

      # ── 6. Build pipeline flags from per-module inputs ────────────────────────
      - name: Build pipeline flags
        id: flags
        run: |
          FLAGS=""

          # Re-enrichment mode: skip discovery/financials steps 1-4
          if [ "${{ inputs.extras_only }}" = "true" ]; then
            FLAGS="$FLAGS --extras-only"
          fi

          # Company count cap (optional quick-test mode)
          if [ -n "${{ inputs.max_companies }}" ] && [ "${{ inputs.max_companies }}" != "0" ]; then
            FLAGS="$FLAGS --max-companies ${{ inputs.max_companies }}"
          fi

          # Search universe: register and combined modes
          if [ "${{ inputs.search_source }}" = "register" ] || [ "${{ inputs.search_source }}" = "both" ]; then
            FLAGS="$FLAGS --search-source ${{ inputs.search_source }}"
            # Split comma-separated register keys and pass each as --reg-source
            IFS=',' read -ra REGS <<< "${{ inputs.reg_sources }}"
            for R in "${REGS[@]}"; do
              R="$(echo "$R" | xargs)"   # trim whitespace
              if [ -n "$R" ]; then
                FLAGS="$FLAGS --reg-source $R"
              fi
            done
            if [ -n "${{ inputs.reg_query }}" ]; then
              FLAGS="$FLAGS --reg-query '${{ inputs.reg_query }}'"
            fi
          fi

          # Company quality filters
          if [ -n "${{ inputs.min_age_years }}" ] && [ "${{ inputs.min_age_years }}" != "0" ]; then
            FLAGS="$FLAGS --min-age ${{ inputs.min_age_years }}"
          fi
          # Region filter (applied at SQL level for speed)
          if [ -n "${{ inputs.region }}" ]; then
            FLAGS="$FLAGS --region '${{ inputs.region }}'"
          fi
          if [ "${{ inputs.clean_charges_only }}" = "true" ]; then
            FLAGS="$FLAGS --clean-charges"
          fi
          if [ -n "${{ inputs.excluded_sics }}" ]; then
            IFS=',' read -ra SICS <<< "${{ inputs.excluded_sics }}"
            for S in "${SICS[@]}"; do
              S="$(echo "$S" | xargs)"
              if [ -n "$S" ]; then
                FLAGS="$FLAGS --exclude-sic $S"
              fi
            done
          fi

          # Trade body discovery
          # Default "AUTO" = dynamic web search; explicit keys e.g. "LEIA,BESA"
          if [ -n "${{ inputs.trade_bodies }}" ] && [ "${{ inputs.trade_bodies }}" != "none" ]; then
            IFS=',' read -ra TBS <<< "${{ inputs.trade_bodies }}"
            for TB in "${TBS[@]}"; do
              TB="$(echo "$TB" | xargs)"
              if [ -n "$TB" ]; then
                FLAGS="$FLAGS --trade-body $TB"
              fi
            done
          fi

          # Per-module skip flags (we skip when the input is 'false')
          if [ "${{ inputs.run_ocr }}" = "false" ]; then
            FLAGS="$FLAGS --no-accounts-ocr"
          fi
          if [ "${{ inputs.run_contacts }}" = "false" ]; then
            FLAGS="$FLAGS --skip-contacts"
          fi
          if [ "${{ inputs.run_sell_signals }}" = "false" ]; then
            FLAGS="$FLAGS --no-sell-signals"
          fi
          if [ "${{ inputs.run_contracts }}" = "false" ]; then
            FLAGS="$FLAGS --no-contracts"
          fi
          if [ "${{ inputs.run_digital }}" = "false" ]; then
            FLAGS="$FLAGS --no-digital"
          fi
          if [ "${{ inputs.run_accreditations }}" = "false" ]; then
            FLAGS="$FLAGS --no-accreditations"
          fi
          if [ "${{ inputs.run_competitor_map }}" = "false" ]; then
            FLAGS="$FLAGS --no-competitor-map"
          fi

          echo "flags=$FLAGS" >> $GITHUB_OUTPUT
          echo "Built flags: $FLAGS"

      # ── 7. Run pipeline ───────────────────────────────────────────────────────
      - name: Run PE sourcing pipeline
        env:
          COMPANIES_HOUSE_API_KEY: ${{ secrets.CH_API_KEY }}
          SECTOR_REGION: ${{ inputs.region }}
          SECTOR_MIN_REVENUE: ${{ inputs.min_revenue }}
        run: |
          SECTOR="${{ inputs.sector }}"
          COMPANIES="${{ inputs.companies }}"
          FLAGS="${{ steps.flags.outputs.flags }}"

          CMD="python3 run.py"

          # Build command: --companies and --sector can be used together or standalone
          if [ -n "$COMPANIES" ] && [ -n "$SECTOR" ]; then
            echo "Running pipeline: sector '$SECTOR' + manual companies"
            CMD="$CMD --sector \"$SECTOR\" --companies \"$COMPANIES\""
          elif [ -n "$COMPANIES" ]; then
            echo "Running pipeline for manual companies: $COMPANIES"
            CMD="$CMD --companies \"$COMPANIES\""
          else
            echo "Running pipeline for: $SECTOR"
            CMD="$CMD --sector \"$SECTOR\""
          fi

          echo "Flags: $FLAGS"
          eval $CMD $FLAGS

      # ── 8. Upload Excel artifact ──────────────────────────────────────────────
      - name: Upload Excel output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pe-sourcing-results
          path: output/*.xlsx
          retention-days: 30
          overwrite: true

      # ── 9. Send completion email via Resend ───────────────────────────────────
      - name: Send completion email
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, urllib.error

          api_key      = os.environ.get("RESEND_API_KEY", "")
          notify_email = "${{ inputs.notify_email }}" or "daniellipinski@mac.com"

          if not api_key:
              print("[notify] RESEND_API_KEY not set — skipping email")
              raise SystemExit(0)

          run_id     = "${{ github.run_id }}"
          repo       = "${{ github.repository }}"
          sector     = "${{ inputs.sector }}"
          status     = "${{ job.status }}"
          run_url    = f"https://github.com/{repo}/actions/runs/{run_id}"
          flags      = "${{ steps.flags.outputs.flags }}"
          extras_only = "${{ inputs.extras_only }}" == "true"

          modules_run = []
          if "${{ inputs.run_ocr }}"           != "false": modules_run.append("Accounts OCR")
          if "${{ inputs.run_contacts }}"       != "false": modules_run.append("Contacts")
          if "${{ inputs.run_sell_signals }}"   != "false": modules_run.append("Sell Signals")
          if "${{ inputs.run_contracts }}"      != "false": modules_run.append("Gov. Contracts")
          if "${{ inputs.run_digital }}"        != "false": modules_run.append("Digital Health")
          if "${{ inputs.run_accreditations }}" != "false": modules_run.append("Accreditations")
          if "${{ inputs.run_competitor_map }}" != "false": modules_run.append("Competitor Map")

          run_type    = "Re-enrichment" if extras_only else "Full search"
          max_co_raw  = "${{ inputs.max_companies }}"
          max_co_str  = f"Top {max_co_raw} companies (test run)" if max_co_raw and max_co_raw != "0" else "All companies"

          payload = {
              "from":    "PE Deal Sourcing <onboarding@resend.dev>",
              "to":      [notify_email],
              "subject": f"✅ {sector.title()} — Deal Sourcing Report Ready ({status})",
              "text": (
                  f"Your {sector} intelligence report has finished.\n\n"
                  f"Run type: {run_type}  |  Status: {status}\n"
                  f"Scope: {max_co_str}\n"
                  f"Modules run: {', '.join(modules_run) if modules_run else 'Core only (1-4)'}\n\n"
                  f"DOWNLOAD YOUR EXCEL:\n{run_url}\n\n"
                  f"→ Open the link → scroll to bottom → click 'pe-sourcing-results'\n\n"
                  f"Run ID: {run_id}\n"
                  f"— PE Deal Sourcing Pipeline\n"
              ),
          }

          data = json.dumps(payload).encode()
          req  = urllib.request.Request(
              "https://api.resend.com/emails",
              data=data,
              headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
              method="POST",
          )
          try:
              resp = urllib.request.urlopen(req, timeout=30)
              body = json.loads(resp.read())
              print(f"[notify] ✅ Email sent to {notify_email}  (id: {body.get('id')})")
          except urllib.error.HTTPError as e:
              print(f"[notify] ⚠ Resend error {e.code}: {e.read().decode()} — email skipped, pipeline succeeded")
          except Exception as e:
              print(f"[notify] ⚠ Email skipped ({e}) — pipeline succeeded")
          EOF
