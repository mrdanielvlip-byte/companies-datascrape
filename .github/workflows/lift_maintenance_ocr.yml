name: Lift Maintenance — OCR Batch + Intelligence Rebuild

# Trigger manually from the GitHub Actions tab
on:
  workflow_dispatch:
    inputs:
      sector:
        description: 'Sector name (for logging)'
        required: false
        default: 'lift_maintenance'

jobs:
  ocr-batch:
    name: Fetch Accounts (OCR) + Rebuild Excel
    runs-on: ubuntu-latest
    timeout-minutes: 330   # 5.5 hours — stays inside GitHub's 6hr limit

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. System dependencies (Tesseract) ───────────────────────────────────
      - name: Install Tesseract OCR
        run: |
          sudo apt-get update -q
          sudo apt-get install -y tesseract-ocr

      # ── 3. Python dependencies ───────────────────────────────────────────────
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install requests openpyxl python-dateutil PyMuPDF

      # ── 4. Write CH API key from GitHub secret ───────────────────────────────
      - name: Write API key
        run: echo "COMPANIES_HOUSE_API_KEY=${{ secrets.CH_API_KEY }}" > .ch_api_key

      # ── 5. Download previous checkpoint (enables resume across runs) ─────────
      # Uses dawidd6/action-download-artifact which can fetch the latest artifact
      # by name even when no run ID is specified. On first run this step is skipped.
      - name: Download previous OCR checkpoint (if exists)
        uses: dawidd6/action-download-artifact@v6
        with:
          name: ocr-checkpoint
          path: /tmp/
          if_no_artifact_found: ignore   # first run: no checkpoint yet
          workflow_conclusion: ''         # accept from any conclusion (incl. cancelled)
        continue-on-error: true

      # ── 6. Run OCR batch ─────────────────────────────────────────────────────
      # fetch_accounts.py reads from data/sectors/lift_maintenance_enriched.json
      # and writes checkpoint to /tmp/lift_accounts.json every 10 records.
      - name: Run OCR batch (fetch_accounts.py)
        env:
          COMPANIES_HOUSE_API_KEY: ${{ secrets.CH_API_KEY }}
          OCR_JSON: /tmp/lift_accounts.json
        run: python3 fetch_accounts.py

      # ── 7. Save checkpoint (runs even if batch timed out / failed) ───────────
      # This means a second run of this workflow will resume from where it left off.
      - name: Upload OCR checkpoint
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ocr-checkpoint
          path: /tmp/lift_accounts.json
          retention-days: 30
          overwrite: true

      # ── 8. Run intelligence rebuild ──────────────────────────────────────────
      # Merges OCR data, runs competitor_map + acquisition_score, builds Excel.
      - name: Run merge and rebuild (merge_and_rebuild.py)
        env:
          COMPANIES_HOUSE_API_KEY: ${{ secrets.CH_API_KEY }}
          OCR_JSON: /tmp/lift_accounts.json
          CI_OUTPUT_PATH: output/UK_Lift_Maintenance_Companies_March2026.xlsx
        run: |
          mkdir -p output
          python3 merge_and_rebuild.py

      # ── 9. Upload final Excel ─────────────────────────────────────────────────
      - name: Upload Excel output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lift-maintenance-excel
          path: output/UK_Lift_Maintenance_Companies_March2026.xlsx
          retention-days: 30
          overwrite: true

      # ── 10. Send completion email via Resend ──────────────────────────────────
      # Uses Resend (resend.com) — free tier, no personal credentials needed.
      # Requires one GitHub secret:
      #   RESEND_API_KEY — get free at resend.com → Dashboard → API Keys
      - name: Send completion email
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, urllib.error

          api_key = os.environ.get("RESEND_API_KEY", "")
          if not api_key:
              print("[notify] RESEND_API_KEY not set — skipping email")
              raise SystemExit(0)

          run_id   = "${{ github.run_id }}"
          repo     = "${{ github.repository }}"
          status   = "${{ job.status }}"
          run_url  = f"https://github.com/{repo}/actions/runs/{run_id}"

          payload = {
              "from":    "PE Deal Sourcing <onboarding@resend.dev>",
              "to":      ["daniellipinski@mac.com"],
              "subject": f"✅ Lift Maintenance Deal Sourcing — Excel Ready ({status})",
              "text": (
                  f"Your UK Lift Maintenance intelligence report has finished.\n\n"
                  f"Status: {status}\n\n"
                  f"DOWNLOAD YOUR EXCEL:\n{run_url}\n\n"
                  f"→ Open the link → scroll to bottom → click 'lift-maintenance-excel'\n\n"
                  f"What's in the file:\n"
                  f"  - Summary Dashboard\n"
                  f"  - All 542 companies with acquisition scores\n"
                  f"  - Prime Targets (Tier 1 & 2)\n"
                  f"  - Competitor Maps\n"
                  f"  - Directors Register\n"
                  f"  - Family Businesses\n\n"
                  f"Run ID: {run_id}\n"
                  f"— PE Deal Sourcing Pipeline\n"
              ),
          }

          data = json.dumps(payload).encode()
          req  = urllib.request.Request(
              "https://api.resend.com/emails",
              data=data,
              headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
              method="POST",
          )
          try:
              resp = urllib.request.urlopen(req, timeout=30)
              body = json.loads(resp.read())
              print(f"[notify] ✅ Email sent  (id: {body.get('id')})")
          except urllib.error.HTTPError as e:
              print(f"[notify] ❌ Resend error {e.code}: {e.read().decode()}")
              raise SystemExit(1)
          EOF
