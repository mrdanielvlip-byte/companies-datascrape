name: Auto-retry Failed Enrichment Batches

# Fires automatically when pe_sourcing.yml completes with a failure.
# Retries failed jobs once (run_attempt 1 → 2) so timed-out or
# crashed batch workers resume from their checkpoint without any
# manual intervention.
#
# Only retries on the FIRST failure (run_attempt == 1) to avoid
# infinite retry loops. If the second attempt also fails, the run
# stays failed and you'll receive the usual GitHub notification.

on:
  workflow_run:
    workflows: ["PE Deal Sourcing — Sector Search"]
    types: [completed]

jobs:
  auto-retry:
    name: Auto-retry failed jobs
    runs-on: ubuntu-latest
    # Only act on the first failure — prevents infinite retry loops
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1

    steps:
      - name: Re-run failed jobs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run_id = ${{ github.event.workflow_run.id }};
            const { owner, repo } = context.repo;

            console.log(`Workflow run ${run_id} failed on attempt 1 — triggering re-run of failed jobs`);
            console.log(`Checkpoints are saved, so jobs will resume from where they stopped`);

            try {
              await github.rest.actions.reRunWorkflowFailedJobs({
                owner,
                repo,
                run_id,
                enable_debug_logging: false,
              });
              console.log(`✅ Re-run triggered for run ${run_id}`);
            } catch (err) {
              console.error(`Failed to trigger re-run: ${err.message}`);
              core.setFailed(err.message);
            }
